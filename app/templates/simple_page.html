{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="max-w-2xl w-full bg-gray-800 p-12 rounded-3xl shadow-lg text-center">
        <h1 class="text-4xl font-bold mb-4">{{ title }}</h1>
        <p class="text-gray-400 mb-6">{{ message }}</p>
        <div class="mt-6">
            <button onclick="window.location.href='{{ button_url }}'" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl">{{ button_label }}</button>
        </div>
    </div>
</div>
{% endblock %}
