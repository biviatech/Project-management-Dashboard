{% extends 'base.html' %}

{% block content %}
<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-semibold">Archive</h2>
    <div class="flex items-center gap-3">
      <button id="archive-refresh" class="px-4 py-2 bg-blue-600 rounded-md">Refresh</button>
    </div>
  </div>

  <div class="bg-gray-800 rounded-lg p-4">
    <div class="overflow-x-auto">
      <table class="min-w-full text-left">
        <thead>
          <tr class="text-gray-400 text-sm">
            <th class="px-4 py-2">Project</th>
            <th class="px-4 py-2">Owner</th>
            <th class="px-4 py-2">Status</th>
            <th class="px-4 py-2">Last Updated</th>
            <th class="px-4 py-2">Action</th>
          </tr>
        </thead>
        <tbody id="archive-list">
          <tr><td colspan="5" class="px-4 py-6 text-center text-gray-500">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  async function loadArchiveProjects() {
    const tbody = document.getElementById('archive-list');
    tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-6 text-center text-gray-500">Loading...</td></tr>';
    try {
      const q = db.collection('projects')
        .where('status', '==', 'archived')
        .orderBy('updatedAt', 'desc')
        .limit(500);

      const snapshot = await q.get();
      if (snapshot.empty) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-6 text-center text-gray-400">No archived projects found.</td></tr>';
        return;
      }

      const rows = snapshot.docs.map(doc => {
        const data = doc.data();
        const name = data.name || 'Untitled';
        const owner = data.owner || data.email || '-';
        const status = data.status || '-';
        const updated = data.updatedAt && data.updatedAt.toDate ? data.updatedAt.toDate().toLocaleString() : '-';
        return `<tr class="border-t"><td class="px-4 py-3">${escapeHtml(name)}</td><td class="px-4 py-3">${escapeHtml(owner)}</td><td class="px-4 py-3">${escapeHtml(status)}</td><td class="px-4 py-3">${escapeHtml(updated)}</td><td class="px-4 py-3"><button class="px-3 py-1 bg-blue-600 rounded-md" onclick="window.location.href='/project/${doc.id}'">View</button></td></tr>`;
      }).join('');
      tbody.innerHTML = rows;
    } catch (e) {
      console.error('Failed to load archived projects', e);
      tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-6 text-center text-red-400">Error loading projects.</td></tr>';
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, function(s) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[s]; });
  }

  onAppReady(() => {
    const btn = document.getElementById('archive-refresh');
    if (btn) btn.addEventListener('click', () => loadArchiveProjects());
    loadArchiveProjects();
  });
</script>

{% endblock %}
