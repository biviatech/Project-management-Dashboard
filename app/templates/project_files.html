{% extends 'base.html' %}

{% block content %}
<div class="p-8">
    <div class="flex justify-between items-center mb-6">
        <div>
            <a href="{{ url_for('main.projects') }}" class="text-blue-400 hover:text-blue-300 flex items-center gap-2 mb-2">← Back to Projects</a>
            <h1 class="text-3xl font-bold">Project Files</h1>
            <p class="text-gray-400">Manage files stored per project (Firebase Storage)</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 bg-gray-800 rounded-2xl p-6">
            <h3 class="text-lg font-semibold mb-4">Projects</h3>
            <div id="project-files-project-list" class="space-y-3 text-sm text-gray-200">
                <div class="text-gray-400">Loading projects...</div>
            </div>
        </div>

        <div class="lg:col-span-2 bg-gray-800 rounded-2xl p-6">
            <h3 class="text-lg font-semibold mb-4">Files</h3>
            <p id="project-files-info" class="text-gray-400 mb-3">Select a project to view its files.</p>
            <div id="project-files-list" class="space-y-2"></div>

            <div class="mt-6">
                <label class="block text-sm text-gray-400 mb-2">Upload File</label>
                <div class="flex gap-2">
                    <input id="project-file-input" type="file" class="bg-gray-700 text-sm text-gray-200 px-3 py-2 rounded-lg" />
                    <button id="project-file-upload" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg">Upload</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// When this page loads, populate the project list and wire actions using existing functions in script.js
onAppReady(async () => {
    const listEl = document.getElementById('project-files-project-list');
    if (!listEl) return;
    try {
        const snap = await db.collection('projects').orderBy('name').limit(200).get();
        const projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        listEl.innerHTML = '';
        if (projects.length === 0) {
            listEl.innerHTML = '<div class="text-gray-400">No projects found.</div>';
            return;
        }
        projects.forEach(p => {
            const row = document.createElement('div');
            row.className = 'p-3 bg-gray-900 rounded-md flex items-center justify-between';
            const tags = (p.tags && Array.isArray(p.tags)) ? p.tags.map(t => `<span class="text-xs px-2 py-1 bg-gray-800 rounded">${escapeHtml(t)}</span>`).join(' ') : '';
            row.innerHTML = `<div class="truncate max-w-[60%]"><div class="font-medium">${escapeHtml(p.name||'Untitled')}</div><div class="text-gray-400 text-xs mt-1">${tags}</div></div><div class="flex gap-2"><button class="px-3 py-1 bg-blue-600 rounded-md text-sm" data-proj="${p.id}">Files</button></div>`;
            const btn = row.querySelector('button[data-proj]');
            btn.addEventListener('click', () => {
                // load files into the right pane
                loadProjectFiles(p.id);
                // highlight selected
                document.querySelectorAll('#project-files-project-list .selected').forEach(el=>el.classList.remove('selected','ring','ring-blue-500'));
                row.classList.add('selected','ring','ring-blue-500');
            });
            listEl.appendChild(row);
        });
    } catch (e) {
        console.error('project_files page load failed', e);
        listEl.innerHTML = '<div class="text-red-400">Failed to load projects.</div>';
    }
});
</script>

{% endblock %}
