{% extends 'base.html' %}

{% block content %}
<div class="p-8">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Tasks</h1>
        <button onclick="showNewTaskModal()" 
                class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl flex items-center gap-2 font-medium">
            <i class="fas fa-plus"></i> New Task
        </button>
    </div>

    <p class="text-gray-400 mb-6">Create, assign, and track tasks across the team.</p>

    <div class="mt-4 bg-gray-800 rounded-2xl p-6 overflow-x-auto">
        <div class="flex justify-between mb-6">
            <input type="text" id="task-search" placeholder="Search tasks..." 
                   class="bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 w-80 focus:outline-none focus:border-blue-500">
            <div class="flex gap-3">
                <select id="filter-status" class="bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                    <option value="">All Statuses</option>
                    <option value="todo">To Do</option>
                    <option value="in_progress">In Progress</option>
                    <option value="review">Review</option>
                    <option value="done">Done</option>
                </select>
                <button onclick="applyTaskFilters()" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded-xl">Filter</button>
            </div>
        </div>

        <table class="w-full">
            <thead>
                <tr class="border-b border-gray-700">
                    <th class="text-left py-4">Title</th>
                    <th class="text-left py-4">Assignee</th>
                    <th class="text-left py-4">Due</th>
                    <th class="text-left py-4">Priority</th>
                    <th class="text-left py-4">Status</th>
                    <th class="text-left py-4">Actions</th>
                </tr>
            </thead>
            <tbody id="tasks-table">
                <!-- populated by JS -->
            </tbody>
        </table>
    </div>

</div>

<script>
var allTasks = [];

function renderTasks(tasks = allTasks) {
    const tbody = document.getElementById('tasks-table');
    tbody.innerHTML = '';
    tasks.forEach(t => {
        const row = document.createElement('tr');
        row.className = 'border-b border-gray-700 hover:bg-gray-700';
        const due = t.due ? new Date(t.due.seconds * 1000).toLocaleDateString() : '';
        row.innerHTML = `
            <td class="py-4 font-medium">${escapeHtml(t.title)}</td>
            <td class="py-4 text-gray-400">${escapeHtml(t.assignee || '')}</td>
            <td class="py-4">${due}</td>
            <td class="py-4">${escapeHtml(t.priority || '')}</td>
            <td class="py-4"><span class="px-3 py-1 rounded-full text-xs bg-blue-500/20 text-blue-400">${escapeHtml(t.status || '')}</span></td>
            <td class="py-4">
                <button onclick="editTask('${t.id}')" class="text-blue-400 hover:text-blue-300 mr-4">Edit</button>
                <button onclick="deleteTask('${t.id}')" class="text-red-400 hover:text-red-300">Delete</button>
            </td>
        `;
        tbody.appendChild(row);
    });
    if (!tasks || tasks.length === 0) {
        const emptyRow = document.createElement('tr');
        emptyRow.innerHTML = '<td colspan="6" class="py-6 text-center text-gray-400">No tasks available</td>';
        tbody.appendChild(emptyRow);
    }
}

function applyTaskFilters() {
    const q = document.getElementById('task-search').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    const filtered = allTasks.filter(t => {
        const matchesQ = !q || (t.title && t.title.toLowerCase().includes(q)) || (t.assignee && t.assignee.toLowerCase().includes(q));
        const matchesStatus = !status || (t.status === status);
        return matchesQ && matchesStatus;
    });
    renderTasks(filtered);
}

function showNewTaskModal(existing = null) {
    const title = existing ? 'Edit Task' : 'Create New Task';
    const id = existing ? existing.id : '';
    const modalHTML = `
    <div id="task-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-3xl p-8 max-w-lg w-full mx-4">
            <h2 class="text-2xl font-bold mb-6">${title}</h2>
            <form id="task-form" onsubmit="handleTaskForm(event, '${id}')">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Title</label>
                        <input type="text" id="task-title" required value="${existing ? escapeHtml(existing.title) : ''}" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Assignee</label>
                            <input type="text" id="task-assignee" value="${existing ? escapeHtml(existing.assignee||'') : ''}" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Due Date</label>
                            <input type="date" id="task-due" value="${existing && existing.due ? new Date(existing.due.seconds*1000).toISOString().slice(0,10) : ''}" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Priority</label>
                            <select id="task-priority" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Status</label>
                            <select id="task-status" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                                <option value="todo">To Do</option>
                                <option value="in_progress">In Progress</option>
                                <option value="review">Review</option>
                                <option value="done">Done</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Description</label>
                        <textarea id="task-desc" rows="3" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">${existing ? escapeHtml(existing.description||'') : ''}</textarea>
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="closeTaskModal()" class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-xl">Cancel</button>
                    <button type="submit" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl">Save Task</button>
                </div>
            </form>
        </div>
    </div>`;
    document.body.insertAdjacentHTML('beforeend', modalHTML);
    // set selects if editing
    if (existing) {
        document.getElementById('task-priority').value = existing.priority || 'Medium';
        document.getElementById('task-status').value = existing.status || 'todo';
    }
}

function closeTaskModal() {
    const m = document.getElementById('task-modal'); if (m) m.remove();
}

async function handleTaskForm(e, id) {
    e.preventDefault();
    const title = document.getElementById('task-title').value;
    const assignee = document.getElementById('task-assignee').value;
    const due = document.getElementById('task-due').value;
    const priority = document.getElementById('task-priority').value;
    const status = document.getElementById('task-status').value;
    const description = document.getElementById('task-desc').value;

    const data = {
        title, assignee, priority, status, description,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    if (due) data.due = new Date(due);

    try {
        if (id) {
            await db.collection('tasks').doc(id).update(data);
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection('tasks').add(data);
        }
    } catch (err) {
        console.error('Task save failed', err);
        alert('Failed to save task: ' + err.message);
    }
    closeTaskModal();
}

async function editTask(id) {
    try {
        const doc = await db.collection('tasks').doc(id).get();
        if (!doc.exists) return alert('Task not found');
        const data = doc.data(); data.id = doc.id;
        showNewTaskModal(data);
    } catch (e) { console.error(e); }
}

async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    try { await db.collection('tasks').doc(id).delete(); } catch(e) { console.error(e); }
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function loadTasks() {
    const unsubscribe = db.collection('tasks').orderBy('createdAt','desc').onSnapshot(snapshot => {
        const tasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        allTasks = tasks;
        renderTasks(tasks);
    });
    registerPageCleanup(unsubscribe);
}

onAppReady(() => {
    loadTasks();
});
</script>

{% endblock %}
