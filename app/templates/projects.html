{% extends 'base.html' %}
{% block content %}
<div class="p-8">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">All Projects</h1>
        <button onclick="showNewProjectModal()" 
                class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl flex items-center gap-2 font-medium">
            <i class="fas fa-plus"></i> New Project
        </button>
    </div>
    <p class="text-gray-400 mb-6">Full Firebase CRUD: Create, Read, Update, Delete projects with tags, links & assets.</p>
    <!-- Projects Table -->
    <div class="mt-8 bg-gray-800 rounded-2xl p-6 overflow-x-auto">
        <div class="flex justify-between mb-6">
            <input type="text" id="search-input" placeholder="Search projects..." 
                   class="bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 w-80 focus:outline-none focus:border-blue-500">
            <button onclick="filterProjects()" 
                    class="px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded-xl">Filter</button>
        </div>
        
        <table class="w-full">
            <thead>
                <tr class="border-b border-gray-700">
                    <th class="text-left py-4">Project Name</th>
                    <th class="text-left py-4">Type</th>
                    <th class="text-left py-4">Status</th>
                    <th class="text-left py-4">Health</th>
                    <th class="text-left py-4">Actions</th>
                </tr>
            </thead>
            <tbody id="projects-table">
                <!-- Populated by JS or Flask -->
            </tbody>
        </table>
    </div>

<script>
    // Real-time projects from Firebase
    var allProjects = [];

    function renderProjects(projects = allProjects) {
        const tbody = document.getElementById('projects-table');
        tbody.innerHTML = '';
        projects.forEach(p => {
            const statusColor = p.status === 'Completed' ? 'bg-emerald-500/20 text-emerald-400' : 
                               (p.status === 'In Development' ? 'bg-blue-500/20 text-blue-400' : 'bg-yellow-500/20 text-yellow-400');
            const health = getProjectHealth(p);
            const row = document.createElement('tr');
            row.className = 'border-b border-gray-700 hover:bg-gray-700';
            row.innerHTML = `
                <td class="py-4 font-medium">${escapeHtml(p.name || '')}</td>
                <td class="py-4 text-gray-400">${escapeHtml(p.type || '')}</td>
                <td class="py-4">
                    <span class="px-3 py-1 rounded-full text-xs bg-blue-500/20 text-blue-400">${escapeHtml(p.status || '')}</span>
                </td>
                <td class="py-4">
                    <span class="px-3 py-1 rounded-full text-xs ${getHealthClass(health)}">${escapeHtml(health)}</span>
                </td>
                <td class="py-4 space-x-3">
                    <button onclick="viewProject('${p.id}')" class="text-blue-400 hover:text-blue-300 font-medium">View</button>
                    <button onclick="showEditProjectModal('${p.id}')" class="text-amber-400 hover:text-amber-300 font-medium">Edit</button>
                </td>
            `;
            tbody.appendChild(row);
        });
        if (!projects || projects.length === 0) {
            const emptyRow = document.createElement('tr');
            emptyRow.innerHTML = '<td colspan="5" class="py-6 text-center text-gray-400">No projects available</td>';
            tbody.appendChild(emptyRow);
        }
    }

    function filterProjects() {
        // Simple search simulation
        alert("🔍 Advanced filters would connect to Firestore here.");
    }

    // Real-time listener
    function loadProjects() {
        const unsubscribe = listenToProjects((projects) => {
            allProjects = projects;
            renderProjects(projects);
        });
        registerPageCleanup(unsubscribe);
    }

    // New Project Modal
    function showNewProjectModal() {
        const modalHTML = `
        <div id="new-project-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
            <div class="bg-gray-800 rounded-3xl p-8 max-w-lg w-full mx-4">
                <h2 class="text-2xl font-bold mb-6">Create New Project</h2>
                <form id="new-project-form" onsubmit="handleNewProject(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Project Name</label>
                            <input type="text" id="proj-name" required class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">Type</label>
                                <select id="proj-type" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                                    <option value="Web Application">Web Application</option>
                                    <option value="Mobile App">Mobile App</option>
                                    <option value="Desktop Application">Desktop Application</option>
                                    <option value="Cybersecurity">Cybersecurity</option>
                                    <option value="Internal Tool">Internal Tool</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">Status</label>
                                <select id="proj-status" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                                    <option value="Idea">Idea</option>
                                    <option value="Local">Local</option>
                                    <option value="In Development" selected>In Development</option>
                                    <option value="Testing">Testing</option>
                                    <option value="Hosted">Hosted</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Description</label>
                            <textarea id="proj-desc" rows="3" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Live URL / GitHub</label>
                            <input type="text" id="proj-url" placeholder="https://..." oninput="updateDerivedFields()" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">GitHub Repo (owner/repo)</label>
                            <input type="text" id="proj-github" placeholder="owner/repo" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Local Path</label>
                            <input type="text" id="proj-localpath" placeholder="path/on/local/machine" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                        </div>
                    </div>
                    <div class="flex gap-3 mt-8">
                        <button type="button" onclick="closeModal()" 
                                class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-xl">Cancel</button>
                        <button type="submit" 
                                class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl">Create Project</button>
                    </div>
                </form>
            </div>
        </div>`;
        
        document.body.insertAdjacentHTML('beforeend', modalHTML);
    }

    function closeModal() {
        const newModal = document.getElementById('new-project-modal');
        if (newModal) newModal.remove();
        const editModal = document.getElementById('edit-project-modal');
        if (editModal) editModal.remove();
    }

    async function handleNewProject(e) {
        e.preventDefault();
        const projectData = {
            name: document.getElementById('proj-name').value,
            type: document.getElementById('proj-type').value,
            status: document.getElementById('proj-status').value,
            description: document.getElementById('proj-desc').value,
            liveUrl: document.getElementById('proj-url').value,
            githubRepo: document.getElementById('proj-github').value,
            localPath: document.getElementById('proj-localpath').value,
            tags: ["Firebase", "Flask"],
            progress: 35
        };
        
        const newProjectId = await createProject(projectData);
        if (!newProjectId) return;
        closeModal();
        alert("✅ Project created successfully in Firestore!");
    }

    function updateDerivedFields() {
        const urlEl = document.getElementById('proj-url');
        const ghEl = document.getElementById('proj-github');
        const lpEl = document.getElementById('proj-localpath');
        if (!urlEl) return;
        const v = urlEl.value.trim();
        if (!v) {
            if (ghEl) ghEl.value = '';
            // Do NOT clear or autofill local path from Live URL per user request
            return;
        }
        try {
            const parsed = new URL(v, window.location.origin);
            const host = parsed.hostname.toLowerCase();
            if (host.includes('github.com')) {
                const parts = parsed.pathname.replace(/^\/+|\/+$/g, '').split('/');
                if (parts.length >= 2) {
                    const ownerRepo = parts.slice(0,2).join('/');
                    if (ghEl) ghEl.value = ownerRepo;
                    // Do not auto-populate local path from the URL
                    return;
                }
            }
            // Fallback: set local path to last segment
            // Do not modify local path for non-github urls
        } catch (e) {
            // Not a valid URL; do nothing
        }
    }

    // Edit Project Modal
    function showEditProjectModal(id) {
        const project = allProjects.find(p => String(p.id) === String(id));
        if (!project) {
            // try fetch single
            getProject(id).then(p => { if (p) openEditModalWithData(id, p); else alert('Project not found'); });
            return;
        }
        openEditModalWithData(id, project);
    }

    function openEditModalWithData(id, project) {
        const modalHTML = `
        <div id="edit-project-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
            <div class="bg-gray-800 rounded-3xl p-8 max-w-lg w-full mx-4">
                <h2 class="text-2xl font-bold mb-6">Edit Project</h2>
                <form id="edit-project-form" onsubmit="handleEditProject(event, '${id}')">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Project Name</label>
                            <input type="text" id="edit-proj-name" required value="${escapeHtml(project.name||'')}" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">Type</label>
                                <select id="edit-proj-type" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                                    <option ${project.type==='Web Application'?'selected':''}>Web Application</option>
                                    <option ${project.type==='Mobile App'?'selected':''}>Mobile App</option>
                                    <option ${project.type==='Desktop Application'?'selected':''}>Desktop Application</option>
                                    <option ${project.type==='Cybersecurity'?'selected':''}>Cybersecurity</option>
                                    <option ${project.type==='Internal Tool'?'selected':''}>Internal Tool</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">Status</label>
                                <select id="edit-proj-status" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                                    <option ${project.status==='Idea'?'selected':''}>Idea</option>
                                    <option ${project.status==='Local'?'selected':''}>Local</option>
                                    <option ${project.status==='In Development'?'selected':''}>In Development</option>
                                    <option ${project.status==='Testing'?'selected':''}>Testing</option>
                                    <option ${project.status==='Hosted'?'selected':''}>Hosted</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Description</label>
                            <textarea id="edit-proj-desc" rows="3" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">${escapeHtml(project.description||'')}</textarea>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Live URL / GitHub</label>
                            <input type="text" id="edit-proj-url" placeholder="https://..." value="${escapeHtml(project.liveUrl||'')}" oninput="/* no-op for local path autofill */" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">GitHub Repo (owner/repo)</label>
                            <input type="text" id="edit-proj-github" placeholder="owner/repo" value="${escapeHtml(project.githubRepo||'')}" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Local Path</label>
                            <input type="text" id="edit-proj-localpath" placeholder="path/on/local/machine" value="${escapeHtml(project.localPath||'')}" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3">
                        </div>
                    </div>
                    <div class="flex gap-3 mt-8">
                        <button type="button" onclick="closeModal()" 
                                class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-xl">Cancel</button>
                        <button type="submit" 
                                class="flex-1 py-3 bg-amber-600 hover:bg-amber-500 rounded-xl">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHTML);
    }

    async function handleEditProject(e, id) {
        e.preventDefault();
        const updates = {
            name: document.getElementById('edit-proj-name').value,
            type: document.getElementById('edit-proj-type').value,
            status: document.getElementById('edit-proj-status').value,
            description: document.getElementById('edit-proj-desc').value,
            liveUrl: document.getElementById('edit-proj-url').value,
            githubRepo: document.getElementById('edit-proj-github').value,
            localPath: document.getElementById('edit-proj-localpath').value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        const saved = await updateProject(id, updates);
        if (!saved) return;
        closeModal();
        alert('✅ Project updated');
    }

    // Initialize on load
    onAppReady(() => {
        loadProjects();
    });
</script>
</div>
{% endblock %}
